<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesturely AI Whiteboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
            overflow:hidden;
        }

        .container{
            width:900px;
            height:520px;
            background:white;
            border-radius:25px;
            display:flex;
            overflow:hidden;
            box-shadow:0px 10px 40px rgba(0,0,0,0.35);
        }

        .sidebar{
            width:280px;
            background:#0f2239;
            color:white;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding-top:50px;
        }

        .logo{
            width:110px;
            height:110px;
            border-radius:50%;
            background:#00cfff;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:55px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .title{
            font-size:28px;
            font-weight:bold;
            margin-bottom:50px;
            letter-spacing:1px;
        }

        .menu-btn{
            width:200px;
            padding:18px;
            margin:12px;
            border:none;
            border-radius:12px;
            background:#2d425d;
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .menu-btn:hover{
            background:#3f5f84;
            transform:scale(1.03);
        }

        .main{
            flex:1;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:40px;
            text-align:center;
            background:#f8fafc;
        }

        .main h1{
            font-size:45px;
            color:#0f172a;
            margin-bottom:20px;
        }

        .main p{
            font-size:20px;
            color:#64748b;
            margin-bottom:40px;
        }

        .start-btn{
            padding:20px 45px;
            border:none;
            border-radius:15px;
            background:#00cfff;
            color:#0f172a;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }

        .start-btn:hover{
            transform:translateY(-3px);
            background:#00b5e6;
        }

        .status{
            position:absolute;
            bottom:15px;
            left:20px;
            color:white;
            font-size:14px;
            opacity:0.8;
        }

    </style>
</head>
<body>

    <div class="container">

        <div class="sidebar">

            <div class="logo">G</div>

            <div class="title">
                GESTURELY
            </div>

            
            </button>

            <button class="menu-btn" onclick="showAbout()">
                ABOUT PROJECT
            </button>

            <button class="menu-btn" onclick="closeWindow()">
                EXIT
            </button>

        </div>

        <div class="main">

            <h1>Welcome to the Future of Writing</h1>

        

            <button class="start-btn" onclick="startBoard()">
                Start Whiteboard
            </button>

        </div>

    </div>

    <div class="status">
        Status : System Ready
    </div>

<script>

function startBoard(){

    fetch('/start/')
    .then(response => {
        alert("AI Whiteboard Started!");
    })

}

function showAbout(){

    alert(
        "Gesturely is an AI Smart Whiteboard using OpenCV, MediaPipe, OCR and Hand Gesture Recognition."
    )

}

function closeWindow(){

    window.close()

}

</script>

</body>
</html>
